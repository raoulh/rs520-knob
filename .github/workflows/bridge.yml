name: Bridge

on:
  push:
    branches: [master]
    paths: ['bridge/**']
  pull_request:
    paths: ['bridge/**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: bridge/go.mod
          cache-dependency-path: bridge/go.sum

      - run: go test ./... -v -count=1

      - run: go vet ./...

  docker:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/bridge" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v6
        with:
          context: bridge
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=bridge
          cache-to: type=gha,mode=max,scope=bridge
