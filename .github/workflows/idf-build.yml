name: IDF Build

on:
  push:
    branches: [master]
    paths:
      - 'idf_app/**'
      - '.devcontainer/**'
  pull_request:
    paths:
      - 'idf_app/**'
      - '.devcontainer/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/devcontainer" >> "$GITHUB_ENV"

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          load: true
          tags: devcontainer:local
          cache-from: type=gha,scope=devcontainer
          cache-to: type=gha,mode=max,scope=devcontainer

      - name: Cache managed components
        uses: actions/cache@v4
        with:
          path: idf_app/managed_components
          key: idf-components-${{ hashFiles('idf_app/main/idf_component.yml') }}

      - name: Build firmware
        run: |
          docker run --rm -u 0:0 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/idf_app \
            devcontainer:local \
            bash -c ". /opt/esp/idf/export.sh > /dev/null 2>&1 && idf.py set-target esp32s3 && idf.py build"

      - name: Fix permissions
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" idf_app/
