name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/devcontainer" >> "$GITHUB_ENV"

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          load: true
          tags: devcontainer:local
          cache-from: type=gha,scope=devcontainer
          cache-to: type=gha,mode=max,scope=devcontainer

      - name: Cache managed components
        uses: actions/cache@v4
        with:
          path: idf_app/managed_components
          key: idf-components-${{ hashFiles('idf_app/main/idf_component.yml') }}

      - name: Inject version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/set(PROJECT_VER .*/set(PROJECT_VER \"${TAG}\")/" idf_app/CMakeLists.txt

      - name: Build firmware
        run: |
          docker run --rm -u 0:0 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/idf_app \
            devcontainer:local \
            bash -c ". /opt/esp/idf/export.sh > /dev/null 2>&1 && idf.py set-target esp32s3 && idf.py build"

      - name: Fix permissions
        run: sudo chown -R "$(id -u):$(id -g)" idf_app/

      - name: Prepare release artifacts
        run: |
          cp idf_app/build/rs520_knob.bin "rs520_knob-${{ github.ref_name }}.bin"
          sha256sum "rs520_knob-${{ github.ref_name }}.bin" > "rs520_knob-${{ github.ref_name }}.bin.sha256"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rs520_knob-*.bin
            rs520_knob-*.sha256
          generate_release_notes: true
